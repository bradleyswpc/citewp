<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AI Search Optimizer by CiteWP">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&amp;display=swap');

      /*
        transform-box: fill-box  → transform-origin is relative to the element's own bounding box
        transform-origin: 50% 50% → scale from the element's own center, not the SVG origin
        This fixes the "expands toward bottom-right" SMIL origin bug.
      */
      .mark {
        font-family: 'Plus Jakarta Sans', 'Poppins', system-ui, sans-serif;
        font-weight: 800;
        font-size: 248px;
        fill: #0C0C0D;
        text-anchor: middle;
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: mark-breathe 3s ease-in-out infinite;
      }

      @keyframes mark-breathe {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.04); }
      }
    </style>
  </defs>

  <!-- Background pulse — SMIL runs even when SVG is loaded as <img> -->
  <rect width="512" height="512" fill="#E8D400">
    <animate
      attributeName="fill"
      values="#E8D400;#F5EC30;#E8D400"
      dur="3s"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>

  <!--
    y="318": baseline pulled up from 345 to account for bracket descenders (~50px below baseline).
    Full bracket span is roughly y=130 (top) to y=368 (bottom) → visual center ~249 ≈ canvas center 256.
  -->
  <text class="mark" x="256" y="318">[A]</text>
</svg>
